<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ファイル共有システム</title>
    <style>
        body {
            font-family: 'Helvetica Neue', Arial, sans-serif;
            max-width: 600px;
            margin: 40px auto;
            padding: 20px;
            background-color: #f5f7fa;
            color: #333;
        }
        h1 { text-align: center; color: #4a5568; }
        .section {
            background: white;
            padding: 20px;
            margin-bottom: 20px;
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
        }
        h2 { border-bottom: 2px solid #edf2f7; padding-bottom: 8px; margin-top: 0; }
        input[type="file"], input[type="text"] {
            width: 100%;
            padding: 10px;
            margin-top: 10px;
            border: 1px solid #cbd5e0;
            border-radius: 4px;
            box-sizing: border-box;
        }
        button {
            width: 100%;
            padding: 12px;
            background-color: #4299e1;
            color: white;
            border: none;
            border-radius: 4px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            margin-top: 15px;
        }
        button:hover { background-color: #3182ce; }
        .file-list { margin-top: 10px; padding-left: 20px; }
        .file-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: #edf2f7;
            padding: 6px 12px;
            margin: 4px 0;
            border-radius: 4px;
            font-size: 14px;
        }
        .remove-btn {
            background: #e53e3e;
            color: white;
            border: none;
            border-radius: 3px;
            padding: 2px 8px;
            cursor: pointer;
            font-size: 12px;
        }
        .remove-btn:hover { background: #c53030; }
        .result-box {
            margin-top: 15px;
            padding: 15px;
            background: #ebf8ff;
            border: 1px solid #bee3f8;
            border-radius: 4px;
            word-break: break-all;
        }
        .download-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 8px 0;
            border-bottom: 1px solid #edf2f7;
        }
        .dl-btn {
            background: #48bb78;
            padding: 6px 12px;
            width: auto;
            margin: 0;
            font-size: 14px;
        }
        .dl-btn:hover { background: #38a169; }
    </style>
</head>
<body>

    <h1>ファイル共有</h1>

    <div class="section">
        <h2>ファイルの作成（アップロード）</h2>
        <input type="file" id="fileInput" multiple>
        
        <div id="selectedFilesArea" style="margin-top: 15px; display: none;">
            <strong>選択されたファイル（個別解除可能）:</strong>
            <div id="fileList" class="file-list"></div>
        </div>

        <button id="uploadBtn">作成（アップロード）</button>
        <div id="uploadResult" class="result-box" style="display: none;"></div>
    </div>

    <div class="section">
        <h2>ファイルのダウンロード</h2>
        <input type="text" id="shareKeyInput" placeholder="20桁のキーを入力してください">
        <button id="searchBtn">ファイルを表示</button>

        <div id="downloadArea" style="margin-top: 15px; display: none;">
            <strong>ファイル一覧:</strong>
            <div id="downloadFileList" style="margin-top: 10px;"></div>
        </div>
    </div>

    <script>
        // 【重要】RenderにデプロイしたURLに書き換えてください（末尾のスラッシュは不要）
        const API_BASE_URL = "https://file-edit-server.onrender.com"; 

        // 選択されたファイルをブラウザ側で一時保持する配列（削除機能のため）
        let selectedFiles = [];

        const fileInput = document.getElementById('fileInput');
        const fileList = document.getElementById('fileList');
        const selectedFilesArea = document.getElementById('selectedFilesArea');
        const uploadBtn = document.getElementById('uploadBtn');
        const uploadResult = document.getElementById('uploadResult');

        // ファイル選択時のイベント
        fileInput.addEventListener('change', (e) => {
            const files = Array.from(e.target.files);
            // 新しく選択されたファイルをリストに追加
            selectedFiles = [...selectedFiles, ...files];
            updateFileList();
            fileInput.value = ""; // 同じファイルを再度選択できるようにリセット
        });

        // 選択されたファイルリストの描画更新
        function updateFileList() {
            fileList.innerHTML = "";
            if (selectedFiles.length === 0) {
                selectedFilesArea.style.display = "none";
                return;
            }
            selectedFilesArea.style.display = "block";

            selectedFiles.forEach((file, index) => {
                const item = document.createElement('div');
                item.className = 'file-item';
                item.innerHTML = `
                    <span>${file.name} (${(file.size / 1024).toFixed(1)} KB)</span>
                    <button class="remove-btn" onclick="removeFile(${index})">削除</button>
                `;
                fileList.appendChild(item);
            });
        }

        // 個別選択解除
        window.removeFile = function(index) {
            selectedFiles.splice(index, 1);
            updateFileList();
        };

        // アップロード処理
        uploadBtn.addEventListener('click', async () => {
            if (selectedFiles.length === 0) {
                alert("ファイルを選択してください。");
                return;
            }

            const formData = new FormData();
            selectedFiles.forEach(file => {
                formData.append('files', file);
            });

            uploadBtn.innerText = "アップロード中...";
            uploadBtn.disabled = true;

            try {
                const response = await fetch(`${API_BASE_URL}/upload`, {
                    method: 'POST',
                    body: formData
                });
                const data = await response.json();

                if (response.ok) {
                    uploadResult.style.display = "block";
                    uploadResult.innerHTML = `
                        <strong>アップロード成功！</strong><br>
                        共有キー: <strong style="color:#e53e3e; font-size:18px;">${data.key}</strong><br>
                        <small>※このキーをダウンロード側に入力してください。</small>
                    `;
                    // フォームクリア
                    selectedFiles = [];
                    updateFileList();
                } else {
                    alert("エラー: " + data.error);
                }
            } catch (err) {
                console.error(err);
                alert("アップロードに失敗しました。サーバーが起動しているか確認してください。");
            } finally {
                uploadBtn.innerText = "作成（アップロード）";
                uploadBtn.disabled = false;
            }
        });

        // 検索・ダウンロード処理
        const shareKeyInput = document.getElementById('shareKeyInput');
        const searchBtn = document.getElementById('searchBtn');
        const downloadArea = document.getElementById('downloadArea');
        const downloadFileList = document.getElementById('downloadFileList');

        searchBtn.addEventListener('click', async () => {
            const key = shareKeyInput.value.trim();
            if (!key) {
                alert("キーを入力してください。");
                return;
            }

            try {
                const response = await fetch(`${API_BASE_URL}/files/${key}`);
                const data = await response.json();

                if (response.ok) {
                    downloadArea.style.display = "block";
                    downloadFileList.innerHTML = "";

                    data.files.forEach(filename => {
                        const item = document.createElement('div');
                        item.className = 'download-item';
                        item.innerHTML = `
                            <span>${filename}</span>
                            <button class="dl-btn" onclick="downloadSingleFile('${key}', '${filename}')">ダウンロード</button>
                        `;
                        downloadFileList.appendChild(item);
                    });
                } else {
                    alert("エラー: " + data.error);
                    downloadArea.style.display = "none";
                }
            } catch (err) {
                console.error(err);
                alert("ファイル情報の取得に失敗しました。");
            }
        });

        // 実際のファイルダウンロードリンクをトリガー
        window.downloadSingleFile = function(key, filename) {
            const url = `${API_BASE_URL}/download/${key}/${filename}`;
            window.open(url, '_blank');
        };
    </script>
</body>
</html>
